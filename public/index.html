<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duet Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-logo">
      <span class="logo-duet">Duet</span><span class="logo-dash">&nbsp;Dashboard</span>
    </div>
    <div class="header-subtitle">ACO REACH Pipeline · Lives Tracker</div>
    <div class="header-right">
      <span class="updated-label" id="updated-time">Loading…</span>
      <button class="refresh-btn" id="refresh-btn" onclick="refreshData()">↻ Refresh</button>
    </div>
  </div>
</header>

<nav class="tabs-bar">
  <div class="tabs-inner">
    <button class="tab-btn active" data-tab="0">Active Pipeline</button>
    <button class="tab-btn" data-tab="1">Team Performance</button>
    <button class="tab-btn" data-tab="2">Funnel Overview</button>
    <button class="tab-btn" data-tab="3">Meetings Next Week</button>
    <button class="tab-btn" data-tab="4">WoW Changes</button>
    <button class="tab-btn" data-tab="5">Pipeline Review</button>
    <button class="tab-btn" data-tab="6">All Deals</button>
  </div>
</nav>

<main class="main-content">
  <div class="tab-panel active" id="panel-0">
    <div class="loading-wrap"><div class="spinner"></div><span class="loading-text">Loading pipeline data…</span></div>
  </div>
  <div class="tab-panel" id="panel-1">
    <div class="loading-wrap"><div class="spinner"></div><span class="loading-text">Loading team performance…</span></div>
  </div>
  <div class="tab-panel" id="panel-2">
    <div class="loading-wrap"><div class="spinner"></div><span class="loading-text">Loading…</span></div>
  </div>
  <div class="tab-panel" id="panel-3">
    <div class="loading-wrap"><div class="spinner"></div><span class="loading-text">Loading meetings…</span></div>
  </div>
  <div class="tab-panel" id="panel-4">
    <div class="loading-wrap"><div class="spinner"></div><span class="loading-text">Loading…</span></div>
  </div>
  <div class="tab-panel" id="panel-5">
    <div class="loading-wrap"><div class="spinner"></div><span class="loading-text">Loading…</span></div>
  </div>
  <div class="tab-panel" id="panel-6">
    <div class="loading-wrap"><div class="spinner"></div><span class="loading-text">Loading all deals…</span></div>
  </div>
</main>

<footer class="site-footer">Built by Parasol</footer>

<script src="/app-core.js"></script>
<script src="/app-tabs1-3.js"></script>
<script src="/app-tabs4-6.js"></script>
</body>
</html>
