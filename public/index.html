<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parasol Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ─── Header ──────────────────────────────────────────────────────────────── -->
<header class="site-header">
  <div class="header-top">
    <div class="header-brand">
      <div class="parasol-logo"></div>
      <div class="brand-text">
        <span class="brand-parasol">Parasol</span><span class="brand-hub"> Hub</span>
        <div class="brand-sub">Client Dashboard Portal</div>
      </div>
    </div>
    <div class="client-switcher">
      <button class="client-btn active" data-client="messagedesk">MessageDesk</button>
      <button class="client-btn" data-client="duet">Duet</button>
    </div>
    <div class="header-right">
      <span class="updated-time" id="updated-time"></span>
      <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
    </div>
  </div>
  <div class="header-divider"></div>
</header>

<!-- ─── Loading ─────────────────────────────────────────────────────────────── -->
<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">Loading data…</div>
</div>

<!-- ─── MessageDesk Panel ────────────────────────────────────────────────────── -->
<div class="client-panel" id="panel-messagedesk">
  <nav class="tabs-bar">
    <div class="tabs-inner" id="md-tabs-nav">
      <button class="tab-btn active" data-tab="md-tab1">Active Pipeline</button>
      <button class="tab-btn" data-tab="md-tab2">Funnel Overview</button>
      <button class="tab-btn" data-tab="md-tab3">Meetings Next Week</button>
      <button class="tab-btn" data-tab="md-tab4">WoW Changes</button>
      <button class="tab-btn" data-tab="md-tab5">2K+ Pipeline Review</button>
      <button class="tab-btn" data-tab="md-tab6">All Deals</button>
    </div>
  </nav>
  <main class="main-content">
    <div class="tab-panel active" id="md-tab1"></div>
    <div class="tab-panel" id="md-tab2"></div>
    <div class="tab-panel" id="md-tab3"></div>
    <div class="tab-panel" id="md-tab4"></div>
    <div class="tab-panel" id="md-tab5"></div>
    <div class="tab-panel" id="md-tab6"></div>
  </main>
</div>

<!-- ─── Duet Panel ───────────────────────────────────────────────────────────── -->
<div class="client-panel hidden" id="panel-duet">
  <nav class="tabs-bar">
    <div class="tabs-inner" id="duet-tabs-nav">
      <button class="tab-btn active" data-tab="duet-tab1">Active Pipeline</button>
      <button class="tab-btn" data-tab="duet-tab2">Funnel Overview</button>
      <button class="tab-btn" data-tab="duet-tab3">Meetings Next Week</button>
      <button class="tab-btn" data-tab="duet-tab4">WoW Changes</button>
      <button class="tab-btn" data-tab="duet-tab5">Pipeline Review</button>
      <button class="tab-btn" data-tab="duet-tab6">All Deals</button>
    </div>
  </nav>
  <main class="main-content">
    <div class="tab-panel active" id="duet-tab1"></div>
    <div class="tab-panel" id="duet-tab2"></div>
    <div class="tab-panel" id="duet-tab3"></div>
    <div class="tab-panel" id="duet-tab4"></div>
    <div class="tab-panel" id="duet-tab5"></div>
    <div class="tab-panel" id="duet-tab6"></div>
  </main>
</div>

<!-- ─── Footer ──────────────────────────────────────────────────────────────── -->
<footer class="site-footer">Built by Parasol</footer>

<script src="messagedesk-tabs1-3.js"></script>
<script src="messagedesk-tabs4-6.js"></script>
<script src="duet-tabs1-3.js"></script>
<script src="duet-tabs4-6.js"></script>
<script src="app-core.js"></script>
</body>
</html>
